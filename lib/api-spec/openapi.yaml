openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification for The Soraa Cafe website
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: menu
    description: Menu items and categories
  - name: gallery
    description: Photo gallery
  - name: contact
    description: Contact form submissions
  - name: about
    description: About information
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /menu/categories:
    get:
      operationId: getMenuCategories
      tags: [menu]
      summary: Get all menu categories
      responses:
        "200":
          description: List of menu categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuCategory"

  /menu/items:
    get:
      operationId: getMenuItems
      tags: [menu]
      summary: Get all menu items, optionally filtered by category
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Filter by category slug
      responses:
        "200":
          description: List of menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"

  /menu/featured:
    get:
      operationId: getFeaturedMenuItems
      tags: [menu]
      summary: Get featured / popular menu items
      responses:
        "200":
          description: List of featured menu items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MenuItem"

  /menu/items/{id}:
    get:
      operationId: getMenuItem
      tags: [menu]
      summary: Get a single menu item by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Menu item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MenuItem"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gallery:
    get:
      operationId: getGalleryPhotos
      tags: [gallery]
      summary: Get all gallery photos
      responses:
        "200":
          description: List of gallery photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryPhoto"

  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit a contact form message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Message submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessage"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /about:
    get:
      operationId: getAbout
      tags: [about]
      summary: Get about / cafe info
      responses:
        "200":
          description: Cafe about info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AboutInfo"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MenuCategory:
      type: object
      required: [id, name, slug, itemCount]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        itemCount:
          type: integer

    MenuItem:
      type: object
      required: [id, name, price, categoryId, categoryName, isVeg, isPopular]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        categoryId:
          type: integer
        categoryName:
          type: string
        isVeg:
          type: boolean
        isPopular:
          type: boolean
        imageUrl:
          type: ["string", "null"]

    GalleryPhoto:
      type: object
      required: [id, imageUrl, title]
      properties:
        id:
          type: integer
        imageUrl:
          type: string
        title:
          type: string
        description:
          type: ["string", "null"]

    ContactInput:
      type: object
      required: [name, email, message]
      properties:
        name:
          type: string
          minLength: 1
        email:
          type: string
        phone:
          type: string
        message:
          type: string
          minLength: 1

    ContactMessage:
      type: object
      required: [id, name, email, message, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        message:
          type: string
        createdAt:
          type: string

    AboutInfo:
      type: object
      required: [name, tagline, description, address, phone, email, openingHours]
      properties:
        name:
          type: string
        tagline:
          type: string
        description:
          type: string
        address:
          type: string
        phone:
          type: string
        email:
          type: string
        openingHours:
          type: array
          items:
            $ref: "#/components/schemas/OpeningHour"

    OpeningHour:
      type: object
      required: [day, hours]
      properties:
        day:
          type: string
        hours:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
